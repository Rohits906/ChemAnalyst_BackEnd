services:
  # 1. Django API Web Service
  - type: web
    name: chem-backend-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter
    preDeployCommand: "python manage.py migrate"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

  # 2. Celery Worker (Handles Platform Sync & Sentiment)
  - type: worker
    name: chem-celery-worker
    env: docker
    dockerContext: .
    dockerCommand: celery -A config worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

  # 3. Celery Beat (Scheduler)
  - type: worker
    name: chem-celery-beat
    env: docker
    dockerContext: .
    dockerCommand: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

databases:
  - name: chem-db
    plan: starter

redis:
  - name: chem-redis
    plan: starter
    ipAllowList: []

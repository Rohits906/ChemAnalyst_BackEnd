services:
  # 1. Django API Web Service (existing - keep as is)
  - type: web
    name: chem-backend-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter
    preDeployCommand: "python manage.py migrate"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

  # 2. Celery Worker (existing - keep as is)
  - type: worker
    name: chem-celery-worker
    env: docker
    dockerContext: .
    dockerCommand: celery -A config worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

  # 3. Celery Beat (existing - keep as is)
  - type: worker
    name: chem-celery-beat
    env: docker
    dockerContext: .
    dockerCommand: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chem-redis
          property: connectionString
      - fromGroup: chem-secrets

  # 4. ✅ ADD: Kafka Consumer Worker (sentiment/general)
  - type: worker
    name: chem-kafka-consumer
    env: docker
    dockerContext: .
    dockerCommand: python consumer_worker.py
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - fromGroup: chem-secrets

  # 5. ✅ ADD: Platform Kafka Consumer (Facebook/Instagram/etc)
  - type: worker
    name: chem-platform-consumer
    env: docker
    dockerContext: .
    dockerCommand: python platform_consumer.py
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chem-db
          property: connectionString
      - fromGroup: chem-secrets

databases:
  - name: chem-db
    plan: starter

redis:
  - name: chem-redis
    plan: starter
    ipAllowList: []
